<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" width="520" height="480">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5a6572"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#5a6572"/>
    </marker>
    <linearGradient id="triFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4d7ed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#dce8f5" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- main triangle -->
  <polygon points="260,55 95,385 425,385"
           fill="url(#triFill)" stroke="#2c3e50" stroke-width="2.4"
           stroke-linejoin="round"/>

  <!-- height (dashed) -->
  <line x1="260" y1="55" x2="260" y2="385"
        stroke="#c0392b" stroke-width="1.6" stroke-dasharray="9,6"/>

  <!-- right-angle square -->
  <rect x="260" y="369" width="16" height="16"
        fill="none" stroke="#2c3e50" stroke-width="1.3"/>

  <!-- tick marks on left leg (midpoint approx 177,220) -->
  <line x1="169" y1="215" x2="186" y2="226" stroke="#2c3e50" stroke-width="2"/>
  <line x1="173" y1="210" x2="190" y2="221" stroke="#2c3e50" stroke-width="2"/>

  <!-- tick marks on right leg (midpoint approx 343,220) -->
  <line x1="334" y1="226" x2="351" y2="215" stroke="#2c3e50" stroke-width="2"/>
  <line x1="330" y1="221" x2="347" y2="210" stroke="#2c3e50" stroke-width="2"/>

  <!-- base dimension line -->
  <line x1="95" y1="420" x2="425" y2="420"
        stroke="#5a6572" stroke-width="1.1"
        marker-start="url(#arr-r)" marker-end="url(#arr)"/>
  <!-- base leader lines -->
  <line x1="95" y1="388" x2="95" y2="425" stroke="#5a6572" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="425" y1="388" x2="425" y2="425" stroke="#5a6572" stroke-width="0.7" stroke-dasharray="3,3"/>

  <!-- height dimension line (right side) -->
  <line x1="460" y1="55" x2="460" y2="385"
        stroke="#c0392b" stroke-width="1.1"
        marker-start="url(#arr-r)" marker-end="url(#arr)"/>
  <!-- height leader lines -->
  <line x1="263" y1="55" x2="465" y2="55" stroke="#c0392b" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="428" y1="385" x2="465" y2="385" stroke="#c0392b" stroke-width="0.7" stroke-dasharray="3,3"/>

  <!-- half-base ticks -->
  <line x1="260" y1="385" x2="260" y2="425" stroke="#5a6572" stroke-width="0.7" stroke-dasharray="3,3"/>

  <!-- LABELS -->
  <!-- L left -->
  <text x="148" y="208"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="28" fill="#2c3e50">L</text>

  <!-- L right -->
  <text x="358" y="208"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="28" fill="#2c3e50">L</text>

  <!-- h -->
  <text x="478" y="225"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="26" fill="#c0392b">h</text>

  <!-- b -->
  <text x="260" y="448"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="26" fill="#5a6572"
        text-anchor="middle">b</text>

  <!-- b/2 left -->
  <text x="177" y="412"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="18" fill="#8899a6"
        text-anchor="middle">b/2</text>

  <!-- b/2 right -->
  <text x="343" y="412"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="18" fill="#8899a6"
        text-anchor="middle">b/2</text>

  <!-- vertex labels -->
  <text x="260" y="40"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="22" fill="#2c3e50"
        text-anchor="middle">A</text>
  <text x="80" y="395"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="22" fill="#2c3e50"
        text-anchor="middle">B</text>
  <text x="440" y="395"
        font-family="'STIX Two Math','Cambria Math','Latin Modern Math',Georgia,serif"
        font-style="italic" font-size="22" fill="#2c3e50"
        text-anchor="middle">C</text>
</svg>
